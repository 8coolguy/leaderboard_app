<!DOCTYPE html>
<html lang="en">
    {% include 'header.html' without context %}
    <body class="bg-slate-50 min-h-screen">
        <div class="flex min-h-screen items-center justify-center px-4 py-12">
            <div class="w-full max-w-md">
                <div class="text-center mb-8">
                    <div class="inline-flex items-center justify-center w-16 h-16 bg-emerald-500 rounded-2xl mb-4">
                        <span class="text-white text-3xl">🚴</span>
                    </div>
                    <h1 class="text-2xl font-bold text-slate-800">Welcome Back</h1>
                    <p class="text-slate-500 mt-1">Sign in to your cycling dashboard</p>
                </div>
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
                    <form class="space-y-5" action="/firebase_login" method="POST">
                        <div>
                            <label for="email" class="block text-sm font-medium text-slate-700 mb-1.5">Email address</label>
                            <input id="email" name="email" type="email" autocomplete="email" required
                                class="block w-full rounded-xl border border-slate-300 px-4 py-3 text-slate-900 placeholder:text-slate-400 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100 text-sm">
                        </div>
                        <div>
                            <div class="flex items-center justify-between mb-1.5">
                                <label for="password" class="block text-sm font-medium text-slate-700">Password</label>
                                <a href="/forgotpassword" class="text-xs text-emerald-600 hover:text-emerald-700 font-medium">Forgot password?</a>
                            </div>
                            <input id="password" name="pass" type="password" autocomplete="current-password" required
                                class="block w-full rounded-xl border border-slate-300 px-4 py-3 text-slate-900 placeholder:text-slate-400 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100 text-sm">
                        </div>
                        <button type="submit"
                            class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-semibold py-3 px-4 rounded-xl transition-colors shadow-sm">
                            Sign In
                        </button>
                    </form>
                    <p class="text-center text-sm text-slate-500 mt-6">
                        Don't have an account?
                        <a href="/signup" class="text-emerald-600 hover:text-emerald-700 font-semibold">Create one</a>
                    </p>
                </div>
            </div>
        </div>
        {% include 'footer.html' without context %}
    </body>
</html>
