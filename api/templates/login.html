<!DOCTYPE html>
<html lang="en">
    {% include 'header.html' without context %}
    <body class="bg-white min-h-screen">
        <div class="flex min-h-screen">
            <div class="flex-1 flex items-center justify-center px-6">
                <div class="w-full max-w-sm">
                    <h1 class="text-xl font-semibold text-slate-900 mb-1">Sign in</h1>
                    <p class="text-sm text-slate-500 mb-8">Welcome back to Virtual Cycling</p>
                    <form action="/firebase_login" method="POST" class="space-y-4">
                        <div>
                            <label for="email" class="block text-xs font-medium text-slate-500 mb-1.5 uppercase tracking-wider">Email</label>
                            <input id="email" name="email" type="email" autocomplete="email" required
                                class="block w-full rounded-lg border border-slate-200 px-3.5 py-2.5 text-sm text-slate-900 placeholder:text-slate-400 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100">
                        </div>
                        <div>
                            <div class="flex items-center justify-between mb-1.5">
                                <label for="password" class="block text-xs font-medium text-slate-500 uppercase tracking-wider">Password</label>
                                <a href="/forgotpassword" class="text-xs text-indigo-600 hover:text-indigo-700">Forgot?</a>
                            </div>
                            <input id="password" name="pass" type="password" autocomplete="current-password" required
                                class="block w-full rounded-lg border border-slate-200 px-3.5 py-2.5 text-sm text-slate-900 placeholder:text-slate-400 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100">
                        </div>
                        <button type="submit"
                            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium py-2.5 px-4 rounded-lg transition-colors">
                            Sign in
                        </button>
                    </form>
                    <p class="text-center text-sm text-slate-400 mt-6">
                        No account? <a href="/signup" class="text-indigo-600 hover:text-indigo-700 font-medium">Create one</a>
                    </p>
                </div>
            </div>
            <div class="hidden lg:flex w-96 bg-slate-50 items-center justify-center">
                <div class="text-center px-12">
                    <div class="w-16 h-16 bg-indigo-100 rounded-2xl flex items-center justify-center mx-auto mb-5">
                        <svg class="w-7 h-7 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                            <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/>
                            <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10"/><path d="M12 2a15.3 15.3 0 00-4 10 15.3 15.3 0 004 10"/>
                        </svg>
                    </div>
                    <h2 class="text-lg font-semibold text-slate-800 mb-2">Virtual Cycling</h2>
                    <p class="text-sm text-slate-500 leading-relaxed">Create rooms, connect sensors, and compete in real-time. Upload your rides to Strava.</p>
                </div>
            </div>
        </div>
    </body>
</html>
