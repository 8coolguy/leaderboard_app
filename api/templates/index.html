<!DOCTYPE html>
<html lang="en">
    {% include 'header.html' without context %}
    {% include 'navbar.html' %}
    <body class="bg-slate-50 min-h-screen">
        <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 pt-8 pb-16">
            <!-- Welcome Header -->
            <div class="mb-8">
                <div hx-get="/session_user" hx-swap="outerHTML" hx-trigger="load"
                    class="text-2xl font-bold text-slate-800"></div>
            </div>

            <!-- Room Cards Row -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
                <!-- Create Room -->
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="w-10 h-10 bg-emerald-100 rounded-xl flex items-center justify-center">
                            <span class="text-emerald-600 text-lg">＋</span>
                        </div>
                        <h2 class="text-lg font-semibold text-slate-800">Create Room</h2>
                    </div>
                    <form action="/create_room" method="POST" class="space-y-3">
                        <input name="name" placeholder="Room name..."
                            class="block w-full rounded-xl border border-slate-300 px-4 py-2.5 text-sm text-slate-900 placeholder:text-slate-400 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100">
                        <button type="submit"
                            class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-semibold py-2.5 px-4 rounded-xl transition-colors text-sm">
                            Create Room
                        </button>
                    </form>
                </div>

                <!-- Join Room -->
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="w-10 h-10 bg-amber-100 rounded-xl flex items-center justify-center">
                            <span class="text-amber-600 text-lg">→</span>
                        </div>
                        <h2 class="text-lg font-semibold text-slate-800">Join Room</h2>
                    </div>
                    <form action="/join_room" method="POST" class="space-y-3">
                        <input name="room_id" placeholder="Room PIN..."
                            class="block w-full rounded-xl border border-slate-300 px-4 py-2.5 text-sm text-slate-900 placeholder:text-slate-400 focus:border-amber-500 focus:ring-2 focus:ring-amber-100">
                        <button type="submit"
                            class="w-full bg-amber-500 hover:bg-amber-600 text-white font-semibold py-2.5 px-4 rounded-xl transition-colors text-sm">
                            Join Room
                        </button>
                    </form>
                </div>
            </div>

            <!-- History Section -->
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                <h2 class="text-lg font-semibold text-slate-800 mb-4">Recent Rides</h2>
                <div hx-get="/history" hx-swap="outerHTML" hx-trigger="load"
                    class="text-sm text-slate-500"></div>
            </div>
        </main>
        {% include 'footer.html' %}
    </body>
</html>
