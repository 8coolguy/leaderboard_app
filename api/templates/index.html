<!DOCTYPE html>
<html lang="en">
    {% include 'header.html' without context %}
    {% include 'navbar.html' %}
    <body class="bg-slate-50 min-h-screen">
        <main class="max-w-2xl mx-auto px-6 pt-12 pb-16">
            <div hx-get="/session_user" hx-swap="outerHTML" hx-trigger="load"
                class="text-xl font-semibold text-slate-900 mb-10"></div>

            <div class="space-y-6">
                <!-- Create Room -->
                <div class="bg-white rounded-xl ring-1 ring-slate-200 p-6">
                    <h2 class="text-sm font-semibold text-slate-800 mb-4">Create a room</h2>
                    <form action="/create_room" method="POST" class="flex gap-3">
                        <input name="name" placeholder="Room name"
                            class="flex-1 rounded-lg border border-slate-200 px-3.5 py-2.5 text-sm text-slate-900 placeholder:text-slate-400 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100">
                        <button type="submit"
                            class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium py-2.5 px-5 rounded-lg transition-colors whitespace-nowrap">
                            Create
                        </button>
                    </form>
                </div>

                <!-- Join Room -->
                <div class="bg-white rounded-xl ring-1 ring-slate-200 p-6">
                    <h2 class="text-sm font-semibold text-slate-800 mb-4">Join a room</h2>
                    <form action="/join_room" method="POST" class="flex gap-3">
                        <input name="room_id" placeholder="Room PIN"
                            class="flex-1 rounded-lg border border-slate-200 px-3.5 py-2.5 text-sm text-slate-900 placeholder:text-slate-400 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100">
                        <button type="submit"
                            class="bg-slate-800 hover:bg-slate-900 text-white text-sm font-medium py-2.5 px-5 rounded-lg transition-colors whitespace-nowrap">
                            Join
                        </button>
                    </form>
                </div>

                <!-- History -->
                <div class="bg-white rounded-xl ring-1 ring-slate-200 p-6">
                    <h2 class="text-sm font-semibold text-slate-800 mb-4">Recent rides</h2>
                    <div hx-get="/history" hx-swap="outerHTML" hx-trigger="load"></div>
                </div>
            </div>
        </main>
        {% include 'footer.html' %}
    </body>
</html>
