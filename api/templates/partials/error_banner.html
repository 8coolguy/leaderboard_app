{% if error %}
<div class="bg-red-50 border border-red-100 rounded-lg p-4 mb-6 flex items-start gap-3">
    <svg class="w-5 h-5 text-red-400 flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <div>
        <p class="text-sm font-semibold text-red-700">{{ error_title or "Error" }}</p>
        <p class="text-sm text-red-600 mt-0.5">{{ error }}</p>
    </div>
</div>
{% endif %}
