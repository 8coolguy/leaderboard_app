<!DOCTYPE html>
<html lang="en">
    {% include 'header.html' without context %}
    <body class="bg-white min-h-screen">
        <div class="flex min-h-screen items-center justify-center px-6">
            <div class="w-full max-w-sm text-center">
                <div class="w-12 h-12 bg-red-100 rounded-xl flex items-center justify-center mx-auto mb-4">
                    <svg class="w-6 h-6 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                </div>
                <h1 class="text-lg font-semibold text-slate-900 mb-2">{{ error_title or "Something went wrong" }}</h1>
                <p class="text-sm text-slate-500 mb-8 leading-relaxed">{{ error }}</p>
                <a href="{{ back_url or '/' }}"
                    class="inline-flex items-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-medium py-2.5 px-5 rounded-lg transition-colors">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M19 12H5m7-7l-7 7 7 7"/></svg>
                    {{ back_label or "Go back" }}
                </a>
            </div>
        </div>
    </body>
</html>
