<!DOCTYPE html>
<html lang="en">
    {% include 'header.html' without context %}
    <body class="bg-white min-h-screen">
        <div class="flex min-h-screen">
            <div class="flex-1 flex items-center justify-center px-6">
                <div class="w-full max-w-sm">
                    <h1 class="text-xl font-semibold text-slate-900 mb-1">Reset password</h1>
                    <p class="text-sm text-slate-500 mb-8">Enter your email and we'll send a reset link</p>
                    <form action="/firebase_forgot_password" method="POST" class="space-y-4">
                        <div>
                            <label for="email" class="block text-xs font-medium text-slate-500 mb-1.5 uppercase tracking-wider">Email</label>
                            <input id="email" name="email" type="email" autocomplete="email" required
                                class="block w-full rounded-lg border border-slate-200 px-3.5 py-2.5 text-sm text-slate-900 placeholder:text-slate-400 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100">
                        </div>
                        <button type="submit"
                            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium py-2.5 px-4 rounded-lg transition-colors">
                            Send reset link
                        </button>
                    </form>
                    <p class="text-center text-sm text-slate-400 mt-6">
                        <a href="/login" class="text-indigo-600 hover:text-indigo-700 font-medium">Back to sign in</a>
                    </p>
                </div>
            </div>
            <div class="hidden lg:flex w-96 bg-slate-50 items-center justify-center">
            </div>
        </div>
    </body>
</html>
