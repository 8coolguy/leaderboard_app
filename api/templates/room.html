<!DOCTYPE html>
<html lang="en">
    {% include 'header.html' with context %}
    <body class="bg-slate-50 min-h-screen">
        {% include 'navbar.html' %}
        {% if room_id %}
        <main class="max-w-7xl mx-auto px-6 pt-6 pb-16">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- Left Column -->
                <div class="lg:col-span-2 space-y-6">
                    <div hx-get="{{ '/session_room/' ~ room_id }}" hx-trigger="load, every 5s"
                        class="bg-white rounded-xl ring-1 ring-slate-200 p-6"></div>

                    <div class="bg-white rounded-xl ring-1 ring-slate-200 p-4">
                        <canvas width="600" height="220" id="canvas" class="w-full rounded-lg"></canvas>
                    </div>

                    <div hx-get="/monitor" hx-trigger="load" hx-swap="outerHTML"></div>
                </div>

                <!-- Right Column -->
                <div class="space-y-6">
                    <div class="bg-white rounded-xl ring-1 ring-slate-200 p-6">
                        <h2 class="text-sm font-semibold text-slate-800 mb-4">Leaderboard</h2>
                        <div hx-get="/leaderboard" hx-trigger="load, every 10s" hx-swap="innerHTML"></div>
                    </div>
                    <div hx-get="/deviceDiv" hx-trigger="load" hx-swap="outerHTML"></div>
                </div>
            </div>
        </main>
        {% endif %}
        {% include 'footer.html' %}
    </body>
</html>
